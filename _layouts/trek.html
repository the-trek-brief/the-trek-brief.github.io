---
layout: default
---
<article class="trek-guide">
  <header class="guide-hero">
    <p class="eyebrow">{{ page.region }} · {{ page.country }}</p>
    <h1>{{ page.title }}</h1>
    <p class="lead">{{ page.summary }}</p>
    <dl class="facts">
      <div><dt>Days</dt><dd>{{ page.days }}</dd></div>
      <div><dt>Distance</dt><dd>{{ page.distance }}</dd></div>
      <div><dt>Best season</dt><dd>{{ page.season }}</dd></div>
    </dl>
  </header>
{% if page.map_data %}
<section class="map-section">
  <p class="map-label">INTERACTIVE MAP</p>
  <div id="trek-map" class="trek-map" aria-label="Interactive trek map"></div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const map = L.map("trek-map", { scrollWheelZoom: false });
    const mapPoints = {};

    L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
  maxZoom: 17,
  attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="https://www.openstreetmap.org/copyright">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org/">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
}).addTo(map);

    const fullscreenControl = L.control({ position: "topright" });

    fullscreenControl.onAdd = function () {
      const button = L.DomUtil.create("button", "map-fullscreen-button");
      button.type = "button";
      button.textContent = "Full screen";
      button.setAttribute("aria-label", "Open map in full screen");

      L.DomEvent.disableClickPropagation(button);
            L.DomEvent.on(button, "click", function () {
        const mapElement = map.getContainer();
        const isExpanded = mapElement.classList.toggle("map-expanded");

        document.body.classList.toggle("map-open", isExpanded);
        button.textContent = isExpanded ? "Close map" : "Full screen";
              if (isExpanded) {
  map.scrollWheelZoom.enable();
} else {
  map.scrollWheelZoom.disable();
}
        map.invalidateSize();
      });

      return button;
    };

    fullscreenControl.addTo(map);

    window.addEventListener("resize", function () {
      map.invalidateSize();
    });

    
    fetch("{{ page.map_data | relative_url }}")
      .then(response => response.json())
      .then(data => {
        const routeLayer = L.geoJSON(data, {
          style: function (feature) {
            const options = feature.properties?._umap_options || {};
            return {
              color: options.color || "#c65d36",
              weight: options.weight || 4,
              opacity: options.opacity || 0.9,
              dashArray: options.dashArray || null
            };
          },
         pointToLayer: function (feature, latlng) {
  const options = feature.properties?._umap_options || {};
  const iconName = (options.iconUrl || "")
    .split("/")
    .pop()
    .replace(".svg", "");

  const symbols = {
  photo: "📷",
  camping: "⛺"
};

if (iconName === "photo") {
  return L.marker(latlng, {
    icon: L.icon({
      iconUrl: "{{ '/assets/camera-marker.png' | relative_url }}",
      iconSize: [34, 44],
      iconAnchor: [17, 42],
      popupAnchor: [0, -42],
      className: "camera-map-icon"
    })
  });
}

if (iconName === "camping") {
  return L.marker(latlng, {
    icon: L.icon({
      iconUrl: "{{ '/assets/tent-marker.png' | relative_url }}",
      iconSize: [42, 42],
      iconAnchor: [21, 21],
      popupAnchor: [0, -24],
      className: "tent-map-icon"
    })
  });
}
  if (options.iconUrl) {
    return L.marker(latlng, {
      icon: L.divIcon({
        className: "umap-symbol-marker",
        html: '<span class="umap-symbol-disc" style="--marker-color: ' +
          (options.color || "#214f46") + '">' +
          (symbols[iconName] || "•") +
          "</span>",
        iconSize: [46, 46],
        iconAnchor: [23, 23],
        popupAnchor: [0, -25]
      })
    });
  }

  return L.circleMarker(latlng, {
    radius: 8,
    color: "#ffffff",
    weight: 2,
    fillColor: options.color || "#214f46",
    fillOpacity: 1
  });
},
          onEachFeature: function (feature, layer) {
            const name = feature.properties?.name;
            const description = feature.properties?.description;
            if (name || description) {
              layer.bindPopup(
                (name ? "<strong>" + name + "</strong>" : "") +
                (description ? "<br>" + description : "")
              );
            }
          }

if (name && layer.getLatLng) {
  mapPoints[name] = layer;
}

          
        }).addTo(map);

        if (routeLayer.getBounds().isValid()) {
          map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
        }

    document.querySelectorAll("[data-map-point]").forEach(function (link) {
  link.addEventListener("click", function (event) {
    const point = mapPoints[this.dataset.mapPoint];

    if (!point) return;

    event.preventDefault();
    document.getElementById("trek-map").scrollIntoView({
      behavior: "smooth",
      block: "center"
    });

    map.setView(point.getLatLng(), 14);
    point.openPopup();
  });
});
      });
  });
</script>
{% endif %}
  <div class="guide-content">{{ content }}</div>
</article>
