---
layout: default
---
<article class="trek-guide">
  <header class="guide-hero">
    <p class="eyebrow">{{ page.region }} · {{ page.country }}</p>
    <h1>{{ page.title }}</h1>
    <p class="lead">{{ page.summary }}</p>
    <dl class="facts">
      <div><dt>Days</dt><dd>{{ page.days }}</dd></div>
      <div><dt>Distance</dt><dd>{{ page.distance }}</dd></div>
      <div><dt>Highest point</dt><dd>{{ page.highest_point }}</dd></div>
      <div><dt>Best season</dt><dd>{{ page.season }}</dd></div>
    </dl>
  </header>
  {% if page.map_note %}<section class="map-panel"><span>MAP</span><p>{{ page.map_note }}</p></section>{% endif %}
  <div class="guide-content">{{ content }}</div>
</article>
